<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roteiro IA — Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #242836;
      --border: #2a2e3a;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --user-bg: #1e3a5f;
      --assistant-bg: #1a1d27;
      --danger: #ef4444;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { display: flex; flex-direction: column; }

    /* Header */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--surface);
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .session-id {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 6px;
    }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .btn-icon:hover { background: var(--surface-hover); color: var(--text); }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      max-width: 780px;
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      background: var(--user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3 { margin: 12px 0 6px; }
    .message.assistant h1 { font-size: 18px; }
    .message.assistant h2 { font-size: 16px; }
    .message.assistant h3 { font-size: 14px; font-weight: 600; }
    .message.assistant strong { color: #a5b4fc; }
    .message.assistant ul, .message.assistant ol { padding-left: 20px; }
    .message.assistant li { margin: 4px 0; }
    .message.assistant code {
      background: #2a2e3a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .typing-indicator {
      align-self: flex-start;
      color: var(--text-muted);
      font-size: 13px;
      padding: 10px 18px;
      display: none;
    }
    .typing-indicator.show { display: block; }
    .typing-indicator span {
      animation: blink 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    .welcome {
      text-align: center;
      color: var(--text-muted);
      margin: auto;
      max-width: 500px;
    }
    .welcome h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 12px;
    }
    .welcome p { font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
    .suggestions { display: flex; flex-direction: column; gap: 8px; }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      color: var(--text);
      transition: all .15s;
    }
    .suggestion:hover { background: var(--surface-hover); border-color: var(--primary); }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }
    .input-row textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      outline: none;
      transition: border-color .15s;
    }
    .input-row textarea:focus { border-color: var(--primary); }
    .input-row textarea::placeholder { color: var(--text-muted); }
    .btn-send {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-send:hover { background: var(--primary-hover); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Settings modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 380px;
      max-width: 90vw;
    }
    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .modal input:focus { border-color: var(--primary); }
    .modal-actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .btn-cancel { background: none; color: var(--text-muted); }
    .btn-save { background: var(--primary); color: #fff; border-color: var(--primary) !important; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Roteiro IA</h1>
    <div class="header-actions">
      <span class="session-id" id="sessionDisplay"></span>
      <button class="btn-icon" id="btnSettings" title="Configurações">&#9881;</button>
      <button class="btn-icon" id="btnNewChat" title="Nova conversa">&#43; Nova</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h2>Bem-vindo ao Roteiro IA</h2>
      <p>
        Eu analiso os anúncios que mais deram certo para te ajudar a criar
        roteiros de vídeo com mais chance de converter. Pode pedir um roteiro
        do zero ou trazer sua ideia para lapidarmos juntos.
      </p>
      <div class="suggestions">
        <button class="suggestion" data-msg="Crie dois roteiros para um anúncio da Plataforma de BI para provedores de internet">Roteiro para Plataforma de BI</button>
        <button class="suggestion" data-msg="Crie dois roteiros para um anúncio de Assessoria Comercial para provedores">Roteiro para Assessoria Comercial</button>
        <button class="suggestion" data-msg="Quais são os padrões mais comuns nos anúncios de sucesso?">Quais padrões aparecem nos anúncios de sucesso?</button>
        <button class="suggestion" data-msg="Tenho uma ideia de roteiro que começa com uma pergunta direta ao dono do provedor. Pode me ajudar a melhorar?">Ajude-me a melhorar uma ideia de roteiro</button>
      </div>
    </div>
    <div class="typing-indicator" id="typing">
      Pensando<span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Digite sua mensagem..." autofocus></textarea>
      <button class="btn-send" id="btnSend">Enviar</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h3>Configurações</h3>
      <label for="cfgApiUrl">URL da API</label>
      <input id="cfgApiUrl" type="text" placeholder="http://localhost:8000">
      <label for="cfgApiKey">API Key (opcional)</label>
      <input id="cfgApiKey" type="password" placeholder="Deixe vazio se não configurou">
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelSettings">Cancelar</button>
        <button class="btn-save" id="btnSaveSettings">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const btnSend = document.getElementById('btnSend');
    const typing = document.getElementById('typing');
    const welcome = document.getElementById('welcome');
    const sessionDisplay = document.getElementById('sessionDisplay');

    // --- Config ---
    const STORAGE_KEY = 'roteiro_ia_config';
    let config = loadConfig();

    function loadConfig() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      const defaultUrl = window.location.origin || 'http://localhost:8000';
      return { apiUrl: defaultUrl, apiKey: '', sessionId: generateId() };
    }

    function saveConfig() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      sessionDisplay.textContent = config.sessionId.substring(0, 8);
    }

    function generateId() {
      return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 8);
    }

    saveConfig();

    // --- Settings modal ---
    const settingsModal = document.getElementById('settingsModal');
    document.getElementById('btnSettings').addEventListener('click', () => {
      document.getElementById('cfgApiUrl').value = config.apiUrl;
      document.getElementById('cfgApiKey').value = config.apiKey;
      settingsModal.classList.add('show');
    });
    document.getElementById('btnCancelSettings').addEventListener('click', () => {
      settingsModal.classList.remove('show');
    });
    document.getElementById('btnSaveSettings').addEventListener('click', () => {
      config.apiUrl = document.getElementById('cfgApiUrl').value.replace(/\/+$/, '');
      config.apiKey = document.getElementById('cfgApiKey').value;
      saveConfig();
      settingsModal.classList.remove('show');
    });

    // --- New chat ---
    document.getElementById('btnNewChat').addEventListener('click', () => {
      config.sessionId = generateId();
      saveConfig();
      chatArea.querySelectorAll('.message').forEach(el => el.remove());
      welcome.style.display = '';
    });

    // --- Suggestions ---
    document.querySelectorAll('.suggestion').forEach(btn => {
      btn.addEventListener('click', () => {
        userInput.value = btn.dataset.msg;
        sendMessage();
      });
    });

    // --- Markdown-lite rendering ---
    function renderMarkdown(text) {
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
      html = html.replace(/\n{2,}/g, '<br><br>');
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    // --- Send message ---
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      welcome.style.display = 'none';
      appendMessage('user', text);
      userInput.value = '';
      autoResize();
      btnSend.disabled = true;
      typing.classList.add('show');
      scrollToBottom();

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (config.apiKey) headers['x-api-key'] = config.apiKey;

        const res = await fetch(`${config.apiUrl}/chat`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ message: text, session_id: config.sessionId }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        appendMessage('assistant', data.reply);
      } catch (err) {
        appendMessage('assistant', `Erro: ${err.message}\n\nVerifique se a API está rodando e as configurações estão corretas.`);
      } finally {
        typing.classList.remove('show');
        btnSend.disabled = false;
        userInput.focus();
      }
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(content);
      } else {
        div.textContent = content;
      }
      chatArea.insertBefore(div, typing);
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
    }

    // --- Input handling ---
    btnSend.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function autoResize() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    }
    userInput.addEventListener('input', autoResize);
  </script>
</body>
</html>
