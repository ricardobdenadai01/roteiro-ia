services:
  - type: web
    name: roteiro-ia-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn chatbot.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CRM_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: ALLOWED_ORIGINS
        value: "*"
